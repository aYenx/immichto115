name: CI

on:
  push:
    branches: [main, master]
    tags-ignore:
      - "v*"
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ── 预检：如果有 v* tag 指向当前 commit，跳过 CI（release workflow 负责） ──
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Check for version tag
        id: check
        run: |
          if git tag --points-at HEAD | grep -qE '^v[0-9]'; then
            TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]' | head -1)
            echo "::notice::Skipping CI — version tag $TAG found. Release workflow handles testing."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  # ── Layer 1: Lint & Type Check (fast gate) ─────────────
  lint:
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Go Vet
        run: go vet ./...

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Frontend Type Check
        working-directory: web
        run: |
          npm ci
          npx vue-tsc --noEmit

  # ── Layer 2: Unit Tests (after lint passes) ────────────
  test:
    runs-on: ubuntu-latest
    needs: [preflight, lint]
    if: needs.preflight.outputs.should_run == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Go Test
        run: go test ./... -race -count=1

  # ── Layer 3: Build Smoke Test ──────────────────────────
  build-check:
    runs-on: ubuntu-latest
    needs: [preflight, test]
    if: needs.preflight.outputs.should_run == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build Backend (smoke test)
        env:
          CGO_ENABLED: "0"
        run: |
          go build -tags embedfront -ldflags="-s -w" -o /dev/null ./cmd/server/
