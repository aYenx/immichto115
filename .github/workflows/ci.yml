name: CI

on:
  push:
    branches: [main, master]
    tags-ignore:
      - "v*"
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ── Layer 1: Lint & Type Check (fast gate) ─────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Go Vet
        run: go vet ./...

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Frontend Type Check
        working-directory: web
        run: |
          npm ci
          npx vue-tsc --noEmit

  # ── Layer 2: Unit Tests (after lint passes) ────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Go Test
        run: go test ./... -race -count=1

  # ── Layer 3: Build Smoke Test ──────────────────────────
  build-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build Backend (smoke test)
        env:
          CGO_ENABLED: "0"
        run: |
          go build -tags embedfront -ldflags="-s -w" -o /dev/null ./cmd/server/
