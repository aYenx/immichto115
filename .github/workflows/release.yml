name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ── 测试（后端 / 前端并行） ──────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Go Vet
        run: go vet ./...

      - name: Go Test
        run: go test ./... -race -count=1

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Frontend Type Check
        working-directory: web
        run: |
          npm ci
          npx vue-tsc --noEmit

  # ── 前端只编译一次（与测试并行） ──────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload Frontend Dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 1

  # ── 后端按架构编译（等测试+前端全部通过） ─────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-frontend]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Frontend Dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build Backend
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DIRTY="false"
          if [ -n "$(git status --porcelain 2>/dev/null)" ]; then
            DIRTY="true"
          fi
          go build -tags embedfront -ldflags="-s -w \
            -X main.version=${{ github.ref_name }} \
            -X main.buildCommit=${{ github.sha }} \
            -X main.buildTime=${BUILD_TIME} \
            -X main.buildDirty=${DIRTY}" \
            -o immichto115-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/server/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: immichto115-${{ matrix.goos }}-${{ matrix.goarch }}
          path: immichto115-${{ matrix.goos }}-${{ matrix.goarch }}

  # ── Docker：复用预编译 binary，不再 QEMU 重新编译 ─────────
  docker:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: immichto115-*
          merge-multiple: true

      - name: Prepare Binary Context
        run: |
          ls -la dist/
          chmod +x dist/immichto115-*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/immichto115
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: dist/
          file: deploy/Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          # Get the previous tag
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, listing all commits"
            RANGE="HEAD"
          else
            echo "Generating changelog: ${PREV_TAG}..${CURRENT_TAG}"
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi

          {
            echo 'body<<CHANGELOG_EOF'

            # Collect commits by category
            FEATS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^feat" 2>/dev/null || true)
            FIXES=$(git log "$RANGE" --pretty=format:"- %s" --grep="^fix" 2>/dev/null || true)
            DOCS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^docs" 2>/dev/null || true)
            REFACTORS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^refactor" 2>/dev/null || true)
            # All other commits
            OTHERS=$(git log "$RANGE" --pretty=format:"- %s" --invert-grep --grep="^feat" --grep="^fix" --grep="^docs" --grep="^refactor" 2>/dev/null || true)

            if [ -n "$FEATS" ]; then
              echo "### ✨ 新功能"
              echo "$FEATS"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### 🐛 修复"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### 📝 文档"
              echo "$DOCS"
              echo ""
            fi

            if [ -n "$REFACTORS" ]; then
              echo "### ♻️ 重构"
              echo "$REFACTORS"
              echo ""
            fi

            if [ -n "$OTHERS" ]; then
              echo "### 🔧 其他"
              echo "$OTHERS"
              echo ""
            fi

            echo "---"
            echo "**Docker**: \`docker pull ghcr.io/ayenx/immichto115:${CURRENT_TAG#v}\`"

            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd dist/
          sha256sum immichto115-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/immichto115-*
            dist/checksums.txt
            deploy/install.sh
